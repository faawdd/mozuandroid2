<?xml version="1.0" encoding="UTF-8"?>
<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 表格：外框 + 分隔线 -->
  <rect x="3" y="5" width="18" height="14" rx="2.5" stroke="#222" stroke-width="1.6" fill="none"/>
  <!-- 顶部表头分隔线 -->
  <line x1="3" y1="9" x2="21" y2="9" stroke="#222" stroke-width="1.5"/>
  <!-- 竖向分隔线 -->
  <line x1="9" y1="9" x2="9" y2="19" stroke="#222" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="15" y1="9" x2="15" y2="19" stroke="#222" stroke-width="1.3" stroke-linecap="round"/>
</svg>
