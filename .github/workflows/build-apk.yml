name: Build Android APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      FLET_APP_PROJECT: mozuapp
      FLET_APP_PRODUCT: "MoZu App"
      FLET_APP_BUNDLE_ID: com.mozu.app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Flet CLI
        run: |
          python -m pip install --upgrade pip
          pip install flet pillow

      - name: Generate app icons
        run: |
          python tools/generate_app_icons.py

      - name: Resolve build version from tag
        shell: bash
        run: |
          RAW_TAG="${GITHUB_REF_NAME}"
          BUILD_VERSION="${RAW_TAG#v}"
          echo "BUILD_VERSION=${BUILD_VERSION}" >> "$GITHUB_ENV"
          echo "Using tag ${RAW_TAG} -> build version ${BUILD_VERSION}"

      - name: Prepare Android signing keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "${ANDROID_KEYSTORE_BASE64}" ]; then
            echo "Missing secret: ANDROID_KEYSTORE_BASE64"
            echo "Please store your fixed upload keystore (.jks) as base64 in repository secrets."
            exit 1
          fi

          KEYSTORE_PATH="$PWD/android-upload-key.jks"
          printf "%s" "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "${KEYSTORE_PATH}"
          if [ ! -s "${KEYSTORE_PATH}" ]; then
            echo "Decoded keystore file is empty or invalid."
            exit 1
          fi

          echo "ANDROID_KEYSTORE_PATH=${KEYSTORE_PATH}" >> "$GITHUB_ENV"
          echo "Keystore prepared at ${KEYSTORE_PATH}"

      - name: Write build version file
        shell: bash
        run: |
          echo "${BUILD_VERSION}" > build_version.txt
          echo "build_version.txt content: $(cat build_version.txt)"

      - name: Build APK with Flet
        env:
          FLET_CLI_NO_RICH_OUTPUT: "1"
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "${ANDROID_KEYSTORE_PATH}" ]; then
            echo "ANDROID_KEYSTORE_PATH is not set."
            exit 1
          fi
          if [ -z "${ANDROID_KEY_ALIAS}" ] || [ -z "${ANDROID_KEYSTORE_PASSWORD}" ] || [ -z "${ANDROID_KEY_PASSWORD}" ]; then
            echo "Missing signing secrets. Required: ANDROID_KEY_ALIAS, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_PASSWORD"
            exit 1
          fi

          flet build apk \
            --split-per-abi \
            --yes \
            --project "${FLET_APP_PROJECT}" \
            --product "${FLET_APP_PRODUCT}" \
            --bundle-id "${FLET_APP_BUNDLE_ID}" \
            --android-signing-key-store "${ANDROID_KEYSTORE_PATH}" \
            --android-signing-key-store-password "${ANDROID_KEYSTORE_PASSWORD}" \
            --android-signing-key-password "${ANDROID_KEY_PASSWORD}" \
            --android-signing-key-alias "${ANDROID_KEY_ALIAS}" \
            --build-version "${BUILD_VERSION}" \
            --build-number "${GITHUB_RUN_NUMBER}"

      - name: List generated APK files
        shell: bash
        run: |
          find build -type f -name "*.apk" | sort || true

      - name: Collect split APKs by ABI
        shell: bash
        run: |
          mkdir -p dist/apk
          mapfile -t ALL_APKS < <(find build -type f -name "*.apk" | sort -u)
          if [ "${#ALL_APKS[@]}" -eq 0 ]; then
            echo "No APK files found."
            exit 1
          fi

          pick_first() {
            local pattern="$1"
            local apk
            for apk in "${ALL_APKS[@]}"; do
              if [[ "$apk" =~ $pattern ]]; then
                echo "$apk"
                return 0
              fi
            done
            return 1
          }

          copy_abi_apk() {
            local abi="$1"
            local src
            if src="$(pick_first "$abi")"; then
              cp "$src" "dist/apk/mozuapp-v${BUILD_VERSION}-${abi}.apk"
              echo "Collected ${abi}: ${src}"
            else
              echo "Skip ${abi}: not found"
            fi
          }

          copy_abi_apk "armeabi-v7a"
          copy_abi_apk "arm64-v8a"
          copy_abi_apk "x86_64"
          copy_abi_apk "x86"

          if ! ls dist/apk/*.apk >/dev/null 2>&1; then
            echo "No split APKs were collected into dist/apk."
            exit 1
          fi

          echo "Collected APKs:"
          ls -lh dist/apk/*.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mozu-flet-apk-split
          path: dist/apk/*.apk
          if-no-files-found: error

      - name: Create Release and upload ABI APKs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "MoZu App v${{ env.BUILD_VERSION }}"
          body: |
            自动发布：按架构拆分的 APK 构建产物。

            - 版本号：${{ env.BUILD_VERSION }}
            - 构建号：${{ github.run_number }}
            - 包名：${{ env.FLET_APP_BUNDLE_ID }}

            已上传独立安装包（按 ABI）：
            - `mozuapp-v${{ env.BUILD_VERSION }}-armeabi-v7a.apk`
            - `mozuapp-v${{ env.BUILD_VERSION }}-arm64-v8a.apk`
            - `mozuapp-v${{ env.BUILD_VERSION }}-x86_64.apk`
            - `mozuapp-v${{ env.BUILD_VERSION }}-x86.apk`
          files: dist/apk/*.apk
          draft: false
          prerelease: false
