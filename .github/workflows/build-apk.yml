name: Build Android APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      FLET_APP_PROJECT: mozuapp
      FLET_APP_PRODUCT: "MoZu App"
      FLET_APP_BUNDLE_ID: com.mozu.app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Flet CLI
        run: |
          python -m pip install --upgrade pip
          pip install flet pillow

      - name: Generate app icons
        run: |
          python tools/generate_app_icons.py

      - name: Resolve build version from tag
        shell: bash
        run: |
          RAW_TAG="${GITHUB_REF_NAME}"
          BUILD_VERSION="${RAW_TAG#v}"
          echo "BUILD_VERSION=${BUILD_VERSION}" >> "$GITHUB_ENV"
          echo "Using tag ${RAW_TAG} -> build version ${BUILD_VERSION}"

      - name: Build APK with Flet
        env:
          FLET_CLI_NO_RICH_OUTPUT: "1"
        run: |
          flet build apk \
            --split-per-abi \
            --yes \
            --project "${FLET_APP_PROJECT}" \
            --product "${FLET_APP_PRODUCT}" \
            --bundle-id "${FLET_APP_BUNDLE_ID}" \
            --build-version "${BUILD_VERSION}" \
            --build-number "${GITHUB_RUN_NUMBER}"

      - name: List generated APK files
        shell: bash
        run: |
          find build -type f -name "*.apk" | sort || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mozo-flet-apk
          path: |
            build/apk/*.apk
            build/apk/**/*.apk
            build/flutter/build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: "MoZu App v${{ env.BUILD_VERSION }}"
          body: |
            自动发布：CI 构建产物。
            
            - 版本号：${{ env.BUILD_VERSION }}
            - 构建号：${{ github.run_number }}
            - 包名：${{ env.FLET_APP_BUNDLE_ID }}
            
            > 本 Release 由 GitHub Actions 自动生成，包含所有 ABI 的 APK 包。
          draft: false
          prerelease: false

      - name: Package APKs for Release
        shell: bash
        run: |
          mkdir -p dist
          find build -type f -name "*.apk" | sort -u > dist/apk_files.txt
          if [ ! -s dist/apk_files.txt ]; then
            echo "No APK files found to package."
            exit 1
          fi
          rm -f dist/mozuapp-apks.zip
          zip dist/mozuapp-apks.zip -@ < dist/apk_files.txt

      - name: Upload APKs to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/mozuapp-apks.zip
          asset_name: mozuapp-apks.zip
          asset_content_type: application/zip
